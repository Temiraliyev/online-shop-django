{% extends "dashboard.html" %}
{% block content %}

<div style="max-width:580px;">
  <div style="background:#fff;border-radius:18px;border:1px solid #e2e8f0;overflow:hidden;">
    <div style="padding:20px 28px;border-bottom:1px solid #e2e8f0;background:#f8fafc;">
      <h3 style="font-size:.85rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin:0;">Mahsulot ma'lumotlarini tahrirlash</h3>
    </div>
    <div style="padding:28px;">
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <div style="display:flex;gap:10px;margin-top:20px;">
          <button class="btn-dash-primary" type="submit" style="padding:11px 24px;font-size:.9rem;">
            <span class="material-icons-round" style="font-size:18px;">save</span> Saqlash
          </button>
          <a href="{% url 'dashboard:products' %}" class="btn-dash-outline" style="padding:11px 20px;font-size:.9rem;">
            Bekor qilish
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
