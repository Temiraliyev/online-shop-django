{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}

<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
  <div style="width:100%;max-width:420px;">
    <div style="background:#fff;border-radius:24px;border:1px solid #e2e8f0;box-shadow:0 8px 40px rgba(5,150,105,.1);overflow:hidden;">
      <div style="padding:32px 36px 24px;border-bottom:1px solid #e2e8f0;text-align:center;">
        <div style="width:52px;height:52px;background:#d1fae5;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
          <span class="material-icons-round" style="font-size:26px;color:#059669;">lock</span>
        </div>
        <h1 style="font-size:1.3rem;font-weight:800;margin:0 0 6px;color:#0f172a;">Yangi parol o'rnatish</h1>
        <p style="color:#64748b;font-size:.875rem;margin:0;">Yangi parolingizni kiriting</p>
      </div>
      <div style="padding:28px 36px;">
        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <button class="btn-primary-custom" type="submit" style="width:100%;justify-content:center;padding:13px;font-size:.95rem;border-radius:12px;margin-top:8px;">
            <span class="material-icons-round" style="font-size:18px;">lock_reset</span>
            Parolni yangilash
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
