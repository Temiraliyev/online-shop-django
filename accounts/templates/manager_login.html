<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <title>Boshqaruv paneli</title>
  <style>body { background-color: #f0f2f5; }</style>
</head>
<body>
  <main class="container">
    <div class="row justify-content-center mt-5 pt-5">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm p-4">
          <h4 class="fw-bold mb-1"><i class="material-icons align-middle">admin_panel_settings</i> Boshqaruv paneli</h4>
          <hr>
          <form method="post">
            {% csrf_token %}
            {{ form }}
            <button class="w-100 btn btn-primary mt-3" type="submit">Kirish</button>
          </form>
          <p class="text-muted mt-3 small"><a href="{% url 'shop:home_page' %}" class="text-decoration-none">← Do'konga qaytish</a></p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
