<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <title>Admin — Chakana Savdo Boshqaruv paneli</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,.4);
    }
    .login-header {
      background: linear-gradient(135deg, #059669, #047857);
      padding: 36px;
      text-align: center;
    }
    .login-body { padding: 32px 36px; }
    .btn-submit {
      background: linear-gradient(135deg, #059669, #047857);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: .95rem;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      transition: opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      font-family: 'Inter', sans-serif;
    }
    .btn-submit:hover { opacity: .88; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div style="width:56px;height:56px;background:rgba(255,255,255,.2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
        <span class="material-icons-round" style="font-size:28px;color:#fff;">admin_panel_settings</span>
      </div>
      <h1 style="color:#fff;font-size:1.4rem;font-weight:800;margin:0 0 4px;">Admin Panel</h1>
      <p style="color:rgba(255,255,255,.7);margin:0;font-size:.875rem;">Chakana Savdo boshqaruv tizimi</p>
    </div>
    <div class="login-body">
      <form method="post">
        {% csrf_token %}
        {{ form }}
        <button class="btn-submit" type="submit">
          <span class="material-icons-round" style="font-size:20px;">login</span>
          Kirish
        </button>
      </form>
      <div style="text-align:center;margin-top:20px;">
        <a href="{% url 'shop:home_page' %}" style="color:#94a3b8;font-size:.85rem;text-decoration:none;">
          ← Do'konga qaytish
        </a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
