{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}

<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">
  <div style="width:100%;max-width:480px;">
    <div style="background:#fff;border-radius:24px;border:1px solid #e2e8f0;box-shadow:0 8px 40px rgba(5,150,105,.12);overflow:hidden;">
      <!-- Header -->
      <div style="background:linear-gradient(135deg,#10b981,#059669);padding:36px 36px 28px;text-align:center;">
        <div style="width:60px;height:60px;background:rgba(255,255,255,.2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <span class="material-icons-round" style="font-size:30px;color:#fff;">person_add</span>
        </div>
        <h1 style="color:#fff;font-size:1.6rem;font-weight:800;margin:0 0 6px;">Hisob yaratish</h1>
        <p style="color:rgba(255,255,255,.75);margin:0;font-size:.9rem;">Chakana Savdo'ga qo'shiling va xarid qiling</p>
      </div>
      <!-- Form -->
      <div style="padding:32px 36px;">
        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <button class="btn-primary-custom" type="submit"
                  style="width:100%;justify-content:center;padding:14px;font-size:1rem;border-radius:12px;margin-top:8px;background:linear-gradient(135deg,#10b981,#059669);">
            <span class="material-icons-round" style="font-size:20px;">how_to_reg</span>
            Ro'yxatdan o'tish
          </button>
        </form>
        <div style="border-top:1px solid #e2e8f0;margin-top:24px;padding-top:20px;text-align:center;">
          <p style="color:#94a3b8;font-size:.875rem;margin:0;">
            Hisobingiz bormi?
            <a href="{% url 'accounts:user_login' %}" style="color:#059669;font-weight:600;text-decoration:none;">Kirish</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
