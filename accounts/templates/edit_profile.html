{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="col-md-5 col-lg-4 mx-auto mt-4">

    <h4 class="fw-bold mb-1"><i class="material-icons align-middle">manage_accounts</i> Profilni tahrirlash</h4>
    <hr>
    <form method="POST">
      {% csrf_token %}
      {{ form|crispy }}
      <button class="btn btn-primary w-100 mt-2" type="submit">Saqlash</button>
    </form>
  </div>
</div>
{% endblock %}
