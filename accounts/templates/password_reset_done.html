{% extends "base.html" %}
{% block content %}

<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;">

    <div style="width:72px;height:72px;background:#d1fae5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
      <span class="material-icons-round" style="font-size:36px;color:#10b981;">mark_email_read</span>
    </div>
    <h1 style="font-size:1.5rem;font-weight:800;color:#0f172a;margin:0 0 12px;">Email yuborildi!</h1>
    <p style="color:#64748b;font-size:.95rem;line-height:1.6;margin:0 0 28px;">
      Parolni tiklash uchun ko'rsatmalar email manzilingizga yuborildi. Iltimos, pochtangizni tekshiring.
    </p>
    <a href="{% url 'accounts:user_login' %}" class="btn-primary-custom" style="display:inline-flex;">
      <span class="material-icons-round" style="font-size:18px;">login</span>
      Kirishga qaytish
    </a>
  </div>
</div>

{% endblock %}
